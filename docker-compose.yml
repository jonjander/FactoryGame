services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      # SQLite in-memory (default); use Data Source=/path/app.db for a file inside the container
      ConnectionStrings__DefaultConnection: ""
