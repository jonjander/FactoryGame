<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactoryGame.Web</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="FactoryGame.Web.styles.css" rel="stylesheet" /> -->
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        (function () {
            var uiPorts = { '7048': 1, '5130': 1 };
            var apiBase = uiPorts[window.location.port] ? 'https://localhost:7145' : '';
            function postClientLog(level, message, source) {
                try {
                    fetch((apiBase || '') + '/diagnostics/client-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            level: level,
                            message: message,
                            ts: new Date().toISOString(),
                            url: location.href,
                            source: source || 'browser'
                        })
                    }).catch(function () { });
                } catch (e) { }
            }
            window.addEventListener('error', function (ev) {
                postClientLog('Error', (ev.message || 'script error') + ' @ ' + (ev.filename || '') + ':' + (ev.lineno || 0), 'window.onerror');
            });
            window.addEventListener('unhandledrejection', function (ev) {
                var reason = ev.reason;
                var text = reason && reason.stack ? reason.stack : String(reason);
                postClientLog('Error', 'Unhandled rejection: ' + text, 'unhandledrejection');
            });
            window.factoryGameClientLog = postClientLog;
        })();
        window.factoryGame = {
            storageGet: (k) => localStorage.getItem(k),
            storageSet: (k, v) => localStorage.setItem(k, v),
            isOnline: () => navigator.onLine,
            /** Avregistrerar service worker, rensar Cache API, laddar om (senaste WASM efter deploy). */
            hardReloadClient: function () {
                void (async () => {
                    try {
                        if ('serviceWorker' in navigator) {
                            const regs = await navigator.serviceWorker.getRegistrations();
                            for (const r of regs)
                                await r.unregister();
                        }
                        if ('caches' in window) {
                            const keys = await caches.keys();
                            await Promise.all(keys.map((k) => caches.delete(k)));
                        }
                    } catch (e) {
                        console.warn('factoryGame.hardReloadClient', e);
                    }
                    window.location.reload();
                })();
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
