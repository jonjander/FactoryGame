<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FactoryGame.Web</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="FactoryGame.Web.styles.css" rel="stylesheet" /> -->
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        (function () {
            var uiPorts = { '7048': 1, '5130': 1 };
            var apiBase = uiPorts[window.location.port] ? 'https://localhost:7145' : '';
            function postClientLog(level, message, source) {
                try {
                    fetch((apiBase || '') + '/diagnostics/client-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            level: level,
                            message: message,
                            ts: new Date().toISOString(),
                            url: location.href,
                            source: source || 'browser'
                        })
                    }).catch(function () { });
                } catch (e) { }
            }
            window.addEventListener('error', function (ev) {
                postClientLog('Error', (ev.message || 'script error') + ' @ ' + (ev.filename || '') + ':' + (ev.lineno || 0), 'window.onerror');
            });
            window.addEventListener('unhandledrejection', function (ev) {
                var reason = ev.reason;
                var text = reason && reason.stack ? reason.stack : String(reason);
                postClientLog('Error', 'Unhandled rejection: ' + text, 'unhandledrejection');
            });
            window.factoryGameClientLog = postClientLog;
        })();
        (function bootWatchdog() {
            var reloadKey = 'fg_boot_reload_attempt';
            var appEl = document.getElementById('app');
            if (!appEl) return;

            var obs = new MutationObserver(function () {
                if (!appEl.querySelector('.loading-progress')) {
                    try { sessionStorage.removeItem(reloadKey); } catch (e) { }
                    obs.disconnect();
                }
            });
            obs.observe(appEl, { childList: true, subtree: true });

            setTimeout(function () {
                if (!appEl.querySelector('.loading-progress')) return;
                try {
                    if (sessionStorage.getItem(reloadKey) === '1') return;
                    sessionStorage.setItem(reloadKey, '1');
                    window.factoryGameClientLog('Warning', 'Blazor boot timeout — clearing PWA cache and reloading', 'bootWatchdog');
                    if (window.factoryGame && window.factoryGame.hardReloadClient) {
                        window.factoryGame.hardReloadClient();
                    } else {
                        window.location.reload();
                    }
                } catch (e) {
                    window.location.reload();
                }
            }, 25000);
        })();
        window.factoryGame = {
            storageGet: (k) => localStorage.getItem(k),
            storageSet: (k, v) => localStorage.setItem(k, v),
            isOnline: () => navigator.onLine,
            /** Unregisters service worker, clears Cache API, reloads (latest WASM after deploy). */
            hardReloadClient: function () {
                void (async () => {
                    try {
                        if ('serviceWorker' in navigator) {
                            const regs = await navigator.serviceWorker.getRegistrations();
                            for (const r of regs)
                                await r.unregister();
                        }
                        if ('caches' in window) {
                            const keys = await caches.keys();
                            await Promise.all(keys.map((k) => caches.delete(k)));
                        }
                    } catch (e) {
                        console.warn('factoryGame.hardReloadClient', e);
                    }
                    window.location.reload();
                })();
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
                .then(function (reg) {
                    reg.addEventListener('updatefound', function () {
                        var worker = reg.installing;
                        if (!worker) return;
                        worker.addEventListener('statechange', function () {
                            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                                worker.postMessage({ type: 'SKIP_WAITING' });
                            }
                        });
                    });
                })
                .catch(function () { });
            var reloadedForSw;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
                if (reloadedForSw) return;
                reloadedForSw = true;
                window.location.reload();
            });
        }
    </script>
</body>

</html>
