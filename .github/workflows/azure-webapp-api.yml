# Deploy FactoryGame API to Azure App Service via FTPS (publish output → site/wwwroot).
#
# GitHub → Settings → Secrets and variables → Actions → New repository secrets:
#   AZURE_FTP_SERVER   = host only, e.g. waws-prod-sec-031.ftp.azurewebsites.windows.net
#   AZURE_FTP_USERNAME = from Deployment Center / publish profile, e.g. FactoryGame\FactoryGame
#   AZURE_FTP_PASSWORD = FTP / deployment password (reset in Azure if exposed)
#
# Hämta värden: Azure Portal → Web App → Deployment Center → FTPS credentials (eller publish profile).

name: Deploy API to Azure Web App

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: azure-webapp-api-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  PUBLISH_DIR: "${{ github.workspace }}/publish"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: dotnet publish src/FactoryGame.Api/FactoryGame.Api.csproj -c Release --no-self-contained -o "${{ env.PUBLISH_DIR }}"

      - name: Deploy via FTPS to wwwroot
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.AZURE_FTP_SERVER }}
          username: ${{ secrets.AZURE_FTP_USERNAME }}
          password: ${{ secrets.AZURE_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./publish/
          server-dir: ./site/wwwroot/
          dangerous-clean-slate: true
          timeout: 600000
          log-level: standard
