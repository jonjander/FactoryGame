# Deploy FactoryGame API to Azure App Service (Linux, .NET 8).
# Prerequisites (GitHub repo → Settings → Secrets and variables → Actions):
#   - Secret:  AZURE_WEBAPP_PUBLISH_PROFILE  (Download publish profile from Azure Portal → Web App → Get publish profile)
#   - Variable: AZURE_WEBAPP_NAME             (Web App name, e.g. factorygame-api)
#
# If Azure Deployment Center generates another workflow, keep one deploy path to avoid double deploys.

name: Deploy API to Azure Web App

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: azure-webapp-api-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  PUBLISH_DIR: "${{ github.workspace }}/publish"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: dotnet publish src/FactoryGame.Api/FactoryGame.Api.csproj -c Release --no-self-contained -o "${{ env.PUBLISH_DIR }}"

      # Azure Log stream shows *runtime* app logs — not GitHub build output. Build/deploy logs live under repo → Actions → this workflow.
      - name: Check Azure deploy configuration
        env:
          WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          if [ -z "$WEBAPP_NAME" ]; then
            echo "::warning::Repository variable AZURE_WEBAPP_NAME is empty — the Deploy step is SKIPPED. No new bits are sent to Azure."
            echo "Fix: GitHub repo → Settings → Secrets and variables → Actions → Variables → add AZURE_WEBAPP_NAME (exact App Service name from Portal, e.g. the name before .azurewebsites.net)."
            echo "Also add secret AZURE_WEBAPP_PUBLISH_PROFILE or deploy will fail when enabled."
          else
            echo "Deploy target Web App name: $WEBAPP_NAME"
          fi

      - name: Deploy to Azure Web App
        if: ${{ vars.AZURE_WEBAPP_NAME != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
