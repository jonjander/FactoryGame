name: CI

# Deploy smoke: verify GitHub → Azure webhook (2026-05-15)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore FactoryGame.sln
      - name: Build
        run: dotnet build FactoryGame.sln --no-restore -c Release
      - name: Test
        run: dotnet test FactoryGame.sln --no-build -c Release --verbosity normal
